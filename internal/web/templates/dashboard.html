<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mc-wake-proxy</title>
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a1f2b;
            --border: #2a3140;
            --text: #e2e6ed;
            --text-dim: #8892a0;
            --accent: #4f8cff;
            --green: #2ecc71;
            --orange: #f39c12;
            --red: #e74c3c;
            --radius: 10px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --mono: ui-monospace, "SF Mono", Consolas, "Liberation Mono", monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 700px;
            padding: 32px 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .phase-dot {
            width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .row:last-child { border-bottom: none; }
        .row .label { color: var(--text-dim); font-size: 13px; }
        .row .value { font-family: var(--mono); font-size: 13px; font-weight: 600; }
        .phase-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
        }
        .logs {
            background: #0a0d13;
            color: #8fe3a8;
            font-family: var(--mono);
            padding: 14px 16px;
            height: 300px;
            overflow-y: auto;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .logs::-webkit-scrollbar { width: 6px; }
        .logs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .refresh {
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span class="phase-dot" id="dot"></span>
                mc-wake-proxy
            </h1>
            <span class="phase-badge" id="badge">Loading...</span>
        </div>

        <div class="card">
            <h2>Server Status</h2>
            <div class="row">
                <span class="label">Phase</span>
                <span class="value" id="phase-text">—</span>
            </div>
            <div class="row">
                <span class="label">Elapsed</span>
                <span class="value" id="elapsed">00:00</span>
            </div>
            <div class="row">
                <span class="label">Address</span>
                <span class="value" id="addr">—</span>
            </div>
            <div class="row">
                <span class="label">Players</span>
                <span class="value" id="players">0 / 0</span>
            </div>
            <div class="row">
                <span class="label">World Seed</span>
                <span class="value" id="seed">N/A</span>
            </div>
        </div>

        <div class="card" id="health-card">
            <h2>Connections</h2>
            <div id="health-checks" style="display:flex;gap:14px;flex-wrap:wrap;font-size:12px;">
                <span id="hc-proxmox">⏳ Proxmox</span>
                <span id="hc-crafty">⏳ Crafty</span>
                <span id="hc-wol">⏳ WOL</span>
                <span id="hc-backend">⏳ Backend</span>
            </div>
        </div>

        <div class="card" id="servers-card" style="display:none;">
            <h2>Servers</h2>
            <table style="width:100%;border-collapse:collapse;">
                <thead>
                    <tr style="color:var(--text-dim);font-size:11px;text-transform:uppercase;">
                        <th style="text-align:left;padding:8px 4px;">Hostname</th>
                        <th style="text-align:left;padding:8px 4px;">Backend</th>
                        <th style="text-align:right;padding:8px 4px;">Status</th>
                    </tr>
                </thead>
                <tbody id="servers-tbody"></tbody>
            </table>
        </div>

        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h2 style="margin-bottom:0;">Event Log</h2>
                <button onclick="copyLogs()" style="background:var(--surface);color:var(--accent);border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;">📋 Copy</button>
            </div>
            <div class="logs" id="logs">Loading...</div>
        </div>

        <div class="refresh">Auto-refreshes every 2 seconds</div>
    </div>

    <script>
        const PHASE_LABELS = {
            'idle':        { label: 'Idle',        color: '#8892a0', dot: '#8892a0' },
            'waking_host': { label: 'Waking Host', color: '#f39c12', dot: '#f39c12' },
            'waiting_lxc': { label: 'Waiting LXC', color: '#f39c12', dot: '#f39c12' },
            'starting_mc': { label: 'Starting MC', color: '#f39c12', dot: '#f39c12' },
            'ready':       { label: 'Ready',       color: '#2ecc71', dot: '#2ecc71' },
        };

        function update() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const phase = data.phase || 'idle';
                    const info = PHASE_LABELS[phase] || PHASE_LABELS['idle'];

                    document.getElementById('dot').style.background = info.dot;
                    document.getElementById('badge').textContent = info.label;
                    document.getElementById('badge').style.background = info.color + '22';
                    document.getElementById('badge').style.color = info.color;
                    document.getElementById('phase-text').textContent = info.label;

                    const since = new Date(data.phase_since);
                    const elapsed = Math.floor((Date.now() - since.getTime()) / 1000);
                    const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
                    const sec = (elapsed % 60).toString().padStart(2, '0');
                    document.getElementById('elapsed').textContent = min + ':' + sec;

                    document.getElementById('addr').textContent = data.server_online
                        ? (window.location.hostname + ':25565')
                        : '— (offline)';

                    document.getElementById('players').textContent =
                        data.players + ' / ' + data.max_players;

                    document.getElementById('seed').textContent = data.world_seed || 'N/A';
                })
                .catch(() => {});

            fetch('/api/logs')
                .then(r => r.json())
                .then(logs => {
                    const el = document.getElementById('logs');
                    el.textContent = logs.join('\n');
                    el.scrollTop = el.scrollHeight;
                })
                .catch(() => {});

            fetch('/api/health')
                .then(r => r.json())
                .then(data => {
                    if (!data.checks) return;
                    data.checks.forEach(function(c) {
                        var id = 'hc-' + c.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                        var el = document.getElementById(id);
                        if (!el) return;
                        var icon = c.ok ? '✅' : '❌';
                        el.textContent = icon + ' ' + c.name;
                        el.title = c.message || '';
                        el.style.color = c.ok ? 'var(--green)' : 'var(--red)';
                    });
                })
                .catch(() => {});
        }

        function copyLogs() {
            const text = document.getElementById('logs').textContent;
            navigator.clipboard.writeText(text).then(function() {
                const btn = event.target;
                btn.textContent = '✅ Copied!';
                setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
            });
        }

        function updateServers() {
            fetch('/api/servers')
                .then(r => r.json())
                .then(servers => {
                    const card = document.getElementById('servers-card');
                    const tbody = document.getElementById('servers-tbody');
                    if (!servers || servers.length === 0) {
                        card.style.display = 'none';
                        return;
                    }
                    card.style.display = '';
                    let html = '';
                    servers.forEach(function(s) {
                        const dot = s.online ? '🟢' : '🔴';
                        const status = s.online ? 'Online' : 'Offline';
                        const color = s.online ? 'var(--green)' : 'var(--red)';
                        html += '<tr>';
                        html += '<td style="padding:8px 4px;font-family:var(--mono);font-size:13px;">' + s.hostname + '</td>';
                        html += '<td style="padding:8px 4px;font-family:var(--mono);font-size:13px;color:var(--text-dim);">' + s.backend + '</td>';
                        html += '<td style="padding:8px 4px;text-align:right;color:' + color + ';font-weight:600;font-size:12px;">' + dot + ' ' + status + '</td>';
                        html += '</tr>';
                    });
                    tbody.innerHTML = html;
                })
                .catch(() => {});
        }

        setInterval(update, 2000);
        setInterval(updateServers, 3000);
        update();
        updateServers();
    </script>
</body>
</html>
