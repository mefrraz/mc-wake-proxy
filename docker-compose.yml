services:
  mc-wake-proxy:
    build: .
    container_name: mc-wake-proxy
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - WOL_MAC=${WOL_MAC}
      - WOL_BROADCAST=${WOL_BROADCAST}
      - BACKEND_TARGET=${BACKEND_TARGET}
      - PROXMOX_HOST=${PROXMOX_HOST}
      - PROXMOX_PORT=${PROXMOX_PORT}
      - PROXMOX_NODE=${PROXMOX_NODE}
      - PROXMOX_LXC_ID=${PROXMOX_LXC_ID}
      - PROXMOX_TOKEN_ID=${PROXMOX_TOKEN_ID}
      - PROXMOX_TOKEN_SECRET=${PROXMOX_TOKEN_SECRET}
      - PROXMOX_INSECURE_SKIP_VERIFY=${PROXMOX_INSECURE_SKIP_VERIFY}
      - CRAFTY_HOST=${CRAFTY_HOST}
      - CRAFTY_PORT=${CRAFTY_PORT}
      - CRAFTY_SCHEME=${CRAFTY_SCHEME}
      - CRAFTY_TOKEN=${CRAFTY_TOKEN}
      - CRAFTY_SERVER_ID=${CRAFTY_SERVER_ID}
      - CRAFTY_INSECURE_SKIP_VERIFY=${CRAFTY_INSECURE_SKIP_VERIFY}
      - MC_LISTEN_PORT=${MC_LISTEN_PORT}
      - WEB_PORT=${WEB_PORT}
      - PROXY_LANG=${PROXY_LANG}
      - COOLDOWN_MINUTES=${COOLDOWN_MINUTES}
      - AUTO_SHUTDOWN_MINUTES=${AUTO_SHUTDOWN_MINUTES}
